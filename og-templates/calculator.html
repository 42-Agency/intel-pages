<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: 'Inter', sans-serif;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            border: 3px solid #1a1a1a;
            border-radius: 24px;
            padding: 48px 80px;
            box-shadow: 8px 8px 0px 0px #1a1a1a;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }
        .logo {
            width: 56px;
            height: 56px;
            background: #DFFE68;
            border: 3px solid #1a1a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
        }
        .title { font-size: 28px; font-weight: 700; }
        .subtitle { font-size: 16px; color: #666; }
        .content {
            text-align: center;
        }
        .headline {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .subtext {
            font-size: 20px;
            color: #666;
            margin-bottom: 32px;
        }
        .badges {
            display: flex;
            gap: 24px;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .badge-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
        .badge-icon.linkedin { background: #0A66C2; }
        .badge-icon.google { background: #4285F4; }
        .badge span { font-weight: 600; }
        .footer {
            margin-top: 40px;
            font-size: 16px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">42</div>
            <div>
                <div class="title">B2B Benchmark Calculator</div>
                <div class="subtitle">by 42 Agency</div>
            </div>
        </div>
        <div class="content">
            <div class="headline">How Does Your Paid Media Stack Up?</div>
            <div class="subtext">Compare your metrics against 87 B2B campaigns</div>
            <div class="badges">
                <div class="badge">
                    <div class="badge-icon linkedin"></div>
                    <span>LinkedIn Ads</span>
                </div>
                <div class="badge">
                    <div class="badge-icon google"></div>
                    <span>Google Ads</span>
                </div>
            </div>
        </div>
        <div class="footer">intel.42agency.com/assess/calculator</div>
    </div>
</body>
</html>
